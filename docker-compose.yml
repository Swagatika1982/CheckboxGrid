version: "3.9"
services:
  valkey:
    image: valkey/valkey
    ports: 
      - 6379:6379
  mongodb:
    image: mongo:8.0
    container_name: mongodb
    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:

